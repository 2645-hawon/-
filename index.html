<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Voca Trainer Pro (89 Words)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f5f7fa; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4a90e2; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-test { background: #4a90e2; color: white; }
        .btn-wrong { background: #e67e22; color: white; }
        .btn-reset { background: #95a5a6; color: white; }
        
        #test-area { display: none; margin-top: 20px; padding: 30px; border: 3px solid #4a90e2; border-radius: 12px; text-align: center; background: #fff; }
        #question-info { color: #7f8c8d; font-size: 0.9em; margin-bottom: 10px; }
        #question-text { font-size: 2.5em; margin: 20px 0; color: #2c3e50; font-weight: bold; }
        input[type="text"] { width: 80%; padding: 12px; font-size: 1.2em; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; outline-color: #4a90e2; }
        
        .word-item { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .is-incorrect { background-color: #fff5f5; color: #e74c3c; }
        .badge { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Voca Trainer</h1>
    
    <div class="btn-group">
        <button class="btn-test" onclick="startTest('toEng', false)">뜻 → 영어</button>
        <button class="btn-test" onclick="startTest('toKor', false)">영어 → 뜻</button>
        <button class="btn-wrong" onclick="startTest('toEng', true)">오답 시험 (뜻→영)</button>
        <button class="btn-wrong" onclick="startTest('toKor', true)">오답 시험 (영→뜻)</button>
        <button class="btn-reset" onclick="resetIncorrect()">오답 초기화</button>
    </div>

    <div id="test-area">
        <div id="question-info"></div>
        <div id="question-text"></div>
        <input type="text" id="answerInput" placeholder="정답을 입력하고 Enter" onkeypress="if(event.keyCode==13) checkAnswer()">
        <br>
        <button class="btn-test" onclick="checkAnswer()">제출</button>
    </div>

    <div class="word-list">
        <h3>단어 목록 (<span id="word-count">0</span>)</h3>
        <div id="list-container"></div>
    </div>
</div>

<script>
    const defaultWords = [
        {word: "lead", mean: "이끌다"}, {word: "meaningful", mean: "의미 있는"}, {word: "comprehension", mean: "이해"},
        {word: "expand", mean: "확장하다"}, {word: "reflective", mean: "반영하는, 사색적인"}, {word: "routine", mean: "일상"},
        {word: "communicative", mean: "의사소통의"}, {word: "function", mean: "기능"}, {word: "all the time", mean: "항상"},
        {word: "find out", mean: "알아내다"}, {word: "along", mean: "~을 따라"}, {word: "be talented at", mean: "~에 재능이 있다"},
        {word: "be interested in", mean: "~에 관심이 있다"}, {word: "choir", mean: "합창단"}, {word: "incredible", mean: "놀라운"},
        {word: "by the way", mean: "그런데"}, {word: "How about ~ing?", mean: "~ing 하는 건 어때?"}, {word: "while", mean: "~하는 동안"},
        {word: "even", mean: "심지어"}, {word: "critically", mean: "비판적으로"}, {word: "lecture", mean: "강의"},
        {word: "fill in", mean: "~을 채우다"}, {word: "discover", mean: "발견하다"}, {word: "passion", mean: "열정"},
        {word: "attend", mean: "참석하다"}, {word: "explore", mean: "탐구하다"}, {word: "introduction", mean: "소개"},
        {word: "experience", mean: "경험"}, {word: "aid", mean: "돕다"}, {word: "enhance", mean: "향상시키다, 높이다"},
        {word: "course", mean: "과정"}, {word: "anyone who", mean: "~하는 누구나"}, {word: "technique", mean: "기법, 기술"},
        {word: "grab", mean: "쥐다"}, {word: "continuously", mean: "계속해서"}, {word: "thought", mean: "생각"},
        {word: "flow", mean: "흐르다"}, {word: "in a while", mean: "한동안"}, {word: "I'm thinking of ~ing.", mean: "나는 ~ing 할까 해."},
        {word: "inner", mean: "내면의"}, {word: "grammar", mean: "문법"}, {word: "those who", mean: "~하는 사람들"},
        {word: "similar", mean: "유사한"}, {word: "behave", mean: "행동하다"}, {word: "social gathering", mean: "친목 모임"},
        {word: "approach", mean: "접근하다"}, {word: "conversation", mean: "대화"}, {word: "logical", mean: "논리적인"},
        {word: "advice", mean: "충고"}, {word: "concern", mean: "걱정"}, {word: "prefer", mean: "선호하다"},
        {word: "detailed", mean: "상세한"}, {word: "socialize", mean: "사귀다"}, {word: "a variety of", mean: "여러 가지의"},
        {word: "actually", mean: "실제로, 사실은"}, {word: "quite", mean: "꽤"}, {word: "different from", mean: "~와 다른"},
        {word: "form", mean: "형태"}, {word: "connection", mean: "연결"}, {word: "intend", mean: "의도하다"},
        {word: "be not sure if", mean: "~인지 아닌지 확실하지 않다"}, {word: "current", mean: "현재의"}, {word: "emotion", mean: "감정"},
        {word: "grateful", mean: "감사해하는"}, {word: "complete", mean: "완성하다"}, {word: "appropriate", mean: "적절한"},
        {word: "relieve", mean: "완화하다"}, {word: "overcome", mean: "극복하다"}, {word: "private", mean: "사적인, 비공개의"},
        {word: "concentrate on", mean: "~에 집중하다"}, {word: "physical", mean: "신체적인"}, {word: "disability", mean: "장애"},
        {word: "participate in", mean: "~에 참가하다"}, {word: "careful", mean: "조심하는, 주의 깊은"}, {word: "store", mean: "저장하다"},
        {word: "personal", mean: "개인적인"}, {word: "anxiety", mean: "불안, 염려"}, {word: "host", mean: "주최자"},
        {word: "including", mean: "~을 포함하여"}, {word: "enormously", mean: "대단히"}, {word: "useful", mean: "유용한"},
        {word: "habit", mean: "습관"}, {word: "as", mean: "~로서"}, {word: "especially", mean: "특히"},
        {word: "subscriber", mean: "구독자"}, {word: "ideally", mean: "이상적으로"}, {word: "concept", mean: "개념"},
        {word: "whatever", mean: "~하는 모든 것"}, {word: "cross one's mind", mean: "생각나다, 떠오르다"}
    ];

    let words = defaultWords;
    // 오답 리스트를 유형별로 분리하여 저장
    let wrongToEng = JSON.parse(localStorage.getItem('wrong_toEng_89')) || [];
    let wrongToKor = JSON.parse(localStorage.getItem('wrong_toKor_89')) || [];
    
    let testQueue = [], currentIndex = 0, currentType = '';

    function renderList() {
        const container = document.getElementById('list-container');
        document.getElementById('word-count').innerText = words.length;
        container.innerHTML = words.map((w, i) => {
            // 어느 한 쪽이라도 틀린 기록이 있으면 오답 표시
            const isWrong = wrongToEng.includes(i) || wrongToKor.includes(i);
            return `<div class="word-item ${isWrong ? 'is-incorrect' : ''}">
                <span><strong>${i+1}. ${w.word}</strong> : ${w.mean}</span>
                ${isWrong ? '<span class="badge">틀림</span>' : ''}
            </div>`;
        }).join('');
    }

    function startTest(type, onlyWrong) {
        // 선택한 타입(toEng / toKor)에 맞는 오답 리스트 사용
        let indices = onlyWrong 
            ? (type === 'toEng' ? wrongToEng : wrongToKor)
            : words.map((_, i) => i);
            
        if (indices.length === 0) return alert("시험볼 단어가 없습니다!");
        
        testQueue = indices.map(id => ({...words[id], originalId: id})).sort(() => Math.random() - 0.5);
        currentIndex = 0;
        currentType = type;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = testQueue[currentIndex];
        document.getElementById('question-info').innerText = `문제 ${currentIndex + 1} / ${testQueue.length}`;
        document.getElementById('question-text').innerText = (currentType === 'toEng') ? q.mean : q.word;
        document.getElementById('answerInput').value = '';
        document.getElementById('answerInput').focus();
    }

    function checkAnswer() {
        const q = testQueue[currentIndex];
        const input = document.getElementById('answerInput').value.trim().toLowerCase();
        let isCorrect = false;

        if (currentType === 'toEng') {
            isCorrect = (input === q.word.toLowerCase());
            if (isCorrect) {
                wrongToEng = wrongToEng.filter(id => id !== q.originalId);
            } else {
                if (!wrongToEng.includes(q.originalId)) wrongToEng.push(q.originalId);
            }
        } else {
            const correctMeans = q.mean.split(/[,/]/).map(s => s.trim());
            isCorrect = correctMeans.some(m => input === m || input === m.replace(/\s/g, ''));
            if (isCorrect) {
                wrongToKor = wrongToKor.filter(id => id !== q.originalId);
            } else {
                if (!wrongToKor.includes(q.originalId)) wrongToKor.push(q.originalId);
            }
        }

        if (isCorrect) {
            alert("정답입니다! ✨");
        } else {
            alert(`오답입니다! ❌\n정답: ${currentType === 'toEng' ? q.word : q.mean}`);
        }

        saveAndNext();
    }

    function saveAndNext() {
        // 각 저장소에 따로 저장
        localStorage.setItem('wrong_toEng_89', JSON.stringify(wrongToEng));
        localStorage.setItem('wrong_toKor_89', JSON.stringify(wrongToKor));
        
        currentIndex++;
        if (currentIndex < testQueue.length) {
            showQuestion();
        } else {
            alert("시험이 끝났습니다!");
            document.getElementById('test-area').style.display = 'none';
            renderList();
        }
    }

    function resetIncorrect() {
        if(confirm("모든 유형의 오답 기록을 삭제할까요?")) {
            wrongToEng = [];
            wrongToKor = [];
            localStorage.setItem('wrong_toEng_89', '[]');
            localStorage.setItem('wrong_toKor_89', '[]');
            renderList();
        }
    }

    renderList();
</script>
</body>
</html>
