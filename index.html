<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 단어장</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f5f7fa; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4a90e2; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: #4a90e2; color: white; }
        .btn-test { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        #test-area { display: none; margin-top: 20px; padding: 30px; border: 2px solid #4a90e2; border-radius: 12px; text-align: center; background: #fff; }
        .word-list { margin-top: 25px; border-top: 2px solid #eee; padding-top: 20px; }
        .word-item { padding: 8px; border-bottom: 1px solid #f0f0f0; font-size: 0.95em; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 My Voca Trainer</h1>
    
    <div class="input-group">
        <input type="text" id="wordInput" placeholder="영어 단어">
        <input type="text" id="meanInput" placeholder="뜻 (쉼표로 구분)">
        <button class="btn-main" onclick="addWord()">추가</button>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn-test" onclick="startTest('word', false)">단어 시험</button>
        <button class="btn-test" onclick="startTest('mean', false)">뜻 시험</button>
        <button class="btn-danger" onclick="startTest('word', true)">오답 시험</button>
        <button class="btn-secondary" onclick="resetIncorrect()">오답 초기화</button>
        <button class="btn-danger" onclick="clearAllData()" style="background:#555;">단어 전체 초기화</button>
    </div>

    <div id="test-area">
        <h2 id="question-text" style="font-size: 2em; margin-bottom: 10px;"></h2>
        <p style="color:#888;">(엔터를 누르면 제출됩니다)</p>
        <input type="text" id="answerInput" placeholder="정답 입력" onkeypress="if(event.keyCode==13) checkAnswer()" style="width: 80%; font-size: 1.2em;">
        <br><br>
        <button class="btn-main" onclick="checkAnswer()">제출</button>
        <button class="btn-secondary" onclick="showHint()">힌트</button>
        <p id="hint-text" style="color: #f39c12; font-weight: bold;"></p>
    </div>

    <div class="word-list">
        <h3>내 단어 리스트 (<span id="word-count">0</span>)</h3>
        <div id="list-container"></div>
    </div>
</div>

<script>
    // 보내주신 모든 단어 리스트 (1~90)
    const defaultWords = [
        {word: "lead", mean: "이끌다"}, {word: "meaningful", mean: "의미 있는"}, {word: "comprehension", mean: "이해"},
        {word: "expand", mean: "확장하다"}, {word: "reflective", mean: "반영하는, 사색적인"}, {word: "routine", mean: "일상"},
        {word: "communicative", mean: "의사소통의"}, {word: "function", mean: "기능"}, {word: "all the time", mean: "항상"},
        {word: "find out", mean: "알아내다"}, {word: "along", mean: "~을 따라"}, {word: "be talented at", mean: "~에 재능이 있다"},
        {word: "be interested in", mean: "~에 관심이 있다"}, {word: "choir", mean: "합창단"}, {word: "incredible", mean: "놀라운"},
        {word: "by the way", mean: "그런데"}, {word: "How about ~ing?", mean: "~ing 하는 건 어때?"}, {word: "while", mean: "~하는 동안"},
        {word: "even", mean: "심지어"}, {word: "critically", mean: "비판적으로"}, {word: "lecture", mean: "강의"},
        {word: "fill in", mean: "~을 채우다"}, {word: "discover", mean: "발견하다"}, {word: "passion", mean: "열정"},
        {word: "attend", mean: "참석하다"}, {word: "explore", mean: "탐구하다"}, {word: "introduction", mean: "소개"},
        {word: "experience", mean: "경험"}, {word: "aid", mean: "돕다"}, {word: "enhance", mean: "향상시키다, 높이다"},
        {word: "course", mean: "과정"}, {word: "anyone who", mean: "~하는 누구나"}, {word: "technique", mean: "기법, 기술"},
        {word: "grab", mean: "쥐다"}, {word: "continuously", mean: "계속해서"}, {word: "thought", mean: "생각"},
        {word: "flow", mean: "흐르다"}, {word: "in a while", mean: "한동안"}, {word: "I'm thinking of ~ing.", mean: "나는 ~ing 할까 해."},
        {word: "inner", mean: "내면의"}, {word: "grammar", mean: "문법"}, {word: "those who", mean: "~하는 사람들"},
        {word: "similar", mean: "유사한"}, {word: "behave", mean: "행동하다"}, {word: "social gathering", mean: "친목 모임"},
        {word: "approach", mean: "접근하다"}, {word: "conversation", mean: "대화"}, {word: "logical", mean: "논리적인"},
        {word: "advice", mean: "충고"}, {word: "concern", mean: "걱정"}, {word: "prefer", mean: "선호하다"},
        {word: "detailed", mean: "상세한"}, {word: "socialize", mean: "사귀다"}, {word: "a variety of", mean: "여러 가지의"},
        {word: "actually", mean: "실제로, 사실은"}, {word: "quite", mean: "꽤"}, {word: "different from", mean: "~와 다른"},
        {word: "form", mean: "형태"}, {word: "connection", mean: "연결"}, {word: "intend", mean: "의도하다"},
        {word: "be not sure if", mean: "~인지 아닌지 확실하지 않다"}, {word: "current", mean: "현재의"}, {word: "emotion", mean: "감정"},
        {word: "grateful", mean: "감사해하는"}, {word: "complete", mean: "완성하다"}, {word: "appropriate", mean: "적절한"},
        {word: "relieve", mean: "완화하다"}, {word: "overcome", mean: "극복하다"}, {word: "private", mean: "사적인, 비공개의"},
        {word: "concentrate on", mean: "~에 집중하다"}, {word: "physical", mean: "신체적인"}, {word: "disability", mean: "장애"},
        {word: "participate in", mean: "~에 참가하다"}, {word: "careful", mean: "조심하는, 주의 깊은"}, {word: "store", mean: "저장하다"},
        {word: "personal", mean: "개인적인"}, {word: "anxiety", mean: "불안, 염려"}, {word: "host", mean: "주최자"},
        {word: "including", mean: "~을 포함하여"}, {word: "enormously", mean: "대단히"}, {word: "useful", mean: "유용한"},
        {word: "habit", mean: "습관"}, {word: "as", mean: "~로서"}, {word: "especially", mean: "특히"},
        {word: "subscriber", mean: "구독자"}, {word: "ideally", mean: "이상적으로"}, {word: "concept", mean: "개념"},
        {word: "whatever", mean: "~하는 모든 것"}, {word: "cross one's mind", mean: "생각나다, 떠오르다"}
    ];

    let words = JSON.parse(localStorage.getItem('words')) || defaultWords;
    let incorrectIndices = JSON.parse(localStorage.getItem('incorrect')) || [];
    let currentTestList = [], currentIndex = 0, testType = '';

    function addWord() {
        const word = document.getElementById('wordInput').value.trim();
        const mean = document.getElementById('meanInput').value.trim();
        if(word && mean) {
            words.push({word, mean});
            saveData();
            renderList();
            document.getElementById('wordInput').value = '';
            document.getElementById('meanInput').value = '';
        }
    }

    function renderList() {
        const container = document.getElementById('list-container');
        document.getElementById('word-count').innerText = words.length;
        container.innerHTML = words.map((w, i) => `
            <div class="word-item">
                <strong>${i+1}. ${w.word}</strong> : ${w.mean}
            </div>
        `).join('');
    }

    function startTest(type, isIncorrect) {
        let list = isIncorrect ? incorrectIndices.map(i => ({...words[i], originalIndex: i})) 
                               : words.map((w, i) => ({...w, originalIndex: i}));
        
        if (list.length === 0) return alert("시험볼 단어가 없습니다!");
        
        currentTestList = list.sort(() => Math.random() - 0.5); // 순서 랜덤
        testType = type;
        currentIndex = 0;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = currentTestList[currentIndex];
        document.getElementById('question-text').innerText = testType === 'word' ? q.mean : q.word;
        document.getElementById('answerInput').value = '';
        document.getElementById('hint-text').innerText = '';
        document.getElementById('answerInput').focus();
    }

    function checkAnswer() {
        const input = document.getElementById('answerInput').value.trim().toLowerCase();
        const q = currentTestList[currentIndex];
        const target = testType === 'word' ? q.word : q.mean;
        
        // 쉼표로 구분된 뜻 처리 및 괄호 무시 로직
        const correctAnswers = target.split(',').map(a => a.replace(/\(.*\)/g, '').trim().toLowerCase());

        if (correctAnswers.includes(input)) {
            alert("정답입니다! 🎉");
            incorrectIndices = incorrectIndices.filter(idx => idx !== q.originalIndex); // 오답에서 제거
        } else {
            alert(`오답입니다! 정답은: ${target}`);
            if (!incorrectIndices.includes(q.originalIndex)) {
                incorrectIndices.push(q.originalIndex); // 오답에 추가
            }
        }

        saveData();
        currentIndex++;
        if (currentIndex < currentTestList.length) {
            showQuestion();
        } else {
            alert("시험이 모두 끝났습니다! 수고하셨습니다.");
            document.getElementById('test-area').style.display = 'none';
            renderList();
        }
    }

    function showHint() {
        const q = currentTestList[currentIndex];
        const hintChar = testType === 'word' ? q.word[0] : q.mean[0];
        document.getElementById('hint-text').innerText = `힌트: '${hintChar}'로 시작합니다.`;
    }

    function saveData() {
        localStorage.setItem('words', JSON.stringify(words));
        localStorage.setItem('incorrect', JSON.stringify(incorrectIndices));
    }

    function resetIncorrect() {
        if(confirm("오답 기록을 모두 초기화할까요?")) {
            incorrectIndices = [];
            saveData();
            alert("오답 기록이 초기화되었습니다.");
        }
    }

    function clearAllData() {
        if(confirm("정말로 모든 단어를 삭제하고 초기 상태로 되돌릴까요?")) {
            localStorage.clear();
            words = [...defaultWords];
            incorrectIndices = [];
            saveData();
            renderList();
            alert("모든 데이터가 초기화되었습니다.");
        }
    }

    renderList();
</script>

</body>
</html>
