<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 스마트 단어장</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #f5f7fa; --accent: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background: var(--secondary); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        .btn-test { background: #2ecc71; color: white; margin: 5px; }
        .btn-danger { background: var(--accent); color: white; }
        #test-area { display: none; background: #fff; border: 2px solid var(--primary); padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 My Voca Trainer</h1>
    <div class="input-group">
        <input type="text" id="wordInput" placeholder="영어 단어">
        <input type="text" id="meanInput" placeholder="뜻 (괄호내용 무시, 쉼표 구분)">
        <button class="btn-add" onclick="addWord()">추가</button>
    </div>

    <div style="text-align: center;">
        <button class="btn-test" onclick="startTest('word', false)">단어 시험</button>
        <button class="btn-test" onclick="startTest('mean', false)">뜻 시험</button>
        <button class="btn-danger" onclick="startTest('word', true)">오답 시험</button>
        <button class="btn-danger" onclick="resetIncorrect()">오답 초기화</button>
    </div>

    <div id="test-area">
        <h3 id="question-text"></h3>
        <input type="text" id="answerInput" placeholder="정답 입력">
        <button class="btn-add" onclick="checkAnswer()">제출</button>
        <button onclick="showHint()">힌트</button>
        <p id="hint-text"></p>
    </div>

    <div id="list-container"></div>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('words')) || [];
    let incorrectIndices = JSON.parse(localStorage.getItem('incorrect')) || [];

    // 초기 단어 데이터 추가
    if (words.length === 0) {
        const defaultWords = [
            {word: "lead", mean: "이끌다"}, {word: "meaningful", mean: "의미 있는"}, {word: "comprehension", mean: "이해"},
            {word: "expand", mean: "확장하다"}, {word: "reflective", mean: "반영하는, 사색적인"}, {word: "routine", mean: "일상"},
            {word: "communicative", mean: "의사소통의"}, {word: "function", mean: "기능"}, {word: "all the time", mean: "항상"},
            {word: "find out", mean: "알아내다"}, {word: "along", mean: "~을 따라"}, {word: "be talented at", mean: "~에 재능이 있다"},
            {word: "be interested in", mean: "~에 관심이 있다"}, {word: "choir", mean: "합창단"}, {word: "incredible", mean: "놀라운"},
            {word: "by the way", mean: "그런데"}, {word: "How about ~ing?", mean: "~ing 하는 건 어때?"}, {word: "while", mean: "~하는 동안"},
            {word: "even", mean: "심지어"}, {word: "critically", mean: "비판적으로"}, {word: "lecture", mean: "강의"},
            {word: "fill in", mean: "~을 채우다"}, {word: "discover", mean: "발견하다"}, {word: "passion", mean: "열정"},
            {word: "attend", mean: "참석하다"}, {word: "explore", mean: "탐구하다"}, {word: "introduction", mean: "소개"},
            {word: "experience", mean: "경험"}, {word: "aid", mean: "돕다"}, {word: "enhance", mean: "향상시키다, 높이다"},
            {word: "course", mean: "과정"}, {word: "anyone who", mean: "~하는 누구나"}, {word: "technique", mean: "기법, 기술"},
            {word: "grab", mean: "쥐다"}, {word: "continuously", mean: "계속해서"}, {word: "thought", mean: "생각"},
            {word: "flow", mean: "흐르다"}, {word: "in a while", mean: "한동안"}, {word: "I'm thinking of ~ing.", mean: "나는 ~ing 할까 해."},
            {word: "inner", mean: "내면의"}, {word: "grammar", mean: "문법"}, {word: "those who", mean: "~하는 사람들"},
            {word: "similar", mean: "유사한"}, {word: "behave", mean: "행동하다"}, {word: "social gathering", mean: "친목 모임"},
            {word: "approach", mean: "접근하다"}, {word: "conversation", mean: "대화"}, {word: "logical", mean: "논리적인"},
            {word: "advice", mean: "충고"}, {word: "concern", mean: "걱정"}, {word: "prefer", mean: "선호하다"},
            {word: "detailed", mean: "상세한"}, {word: "socialize", mean: "사귀다"}, {word: "a variety of", mean: "여러 가지의"},
            {word: "actually", mean: "실제로, 사실은"}, {word: "quite", mean: "꽤"}, {word: "different from", mean: "~와 다른"},
            {word: "form", mean: "형태"}, {word: "connection", mean: "연결"}, {word: "intend", mean: "의도하다"},
            {word: "be not sure if", mean: "~인지 아닌지 확실하지 않다"}, {word: "current", mean: "현재의"}, {word: "emotion", mean: "감정"},
            {word: "grateful", mean: "감사해하는"}, {word: "complete", mean: "완성하다"}, {word: "appropriate", mean: "적절한"},
            {word: "relieve", mean: "완화하다"}, {word: "overcome", mean: "극복하다"}, {word: "private", mean: "사적인"},
            {word: "concentrate on", mean: "~에 집중하다"}, {word: "physical", mean: "신체적인"}, {word: "disability", mean: "장애"},
            {word: "participate in", mean: "~에 참가하다"}, {word: "careful", mean: "조심하는"}, {word: "store", mean: "저장하다"},
            {word: "personal", mean: "개인적인"}, {word: "anxiety", mean: "불안"}, {word: "host", mean: "주최자"},
            {word: "including", mean: "~을 포함하여"}, {word: "enormously", mean: "대단히"}, {word: "useful", mean: "유용한"},
            {word: "habit", mean: "습관"}, {word: "as", mean: "~로서"}, {word: "especially", mean: "특히"},
            {word: "subscriber", mean: "구독자"}, {word: "ideally", mean: "이상적으로"}, {word: "concept", mean: "개념"},
            {word: "whatever", mean: "~하는 모든 것"}, {word: "cross one's mind", mean: "생각나다, 떠오르다"}
        ];
        words = defaultWords;
        saveData();
    }

    // 괄호 제거 함수
    function cleanText(text) { return text.replace(/\(.*\)/g, '').trim(); }

    let currentTestList = [], currentIndex = 0, testType = '';

    function startTest(type, onlyIncorrect) {
        let list = onlyIncorrect ? incorrectIndices.map(i => ({...words[i], originalIndex: i})) 
                                 : words.map((w, i) => ({...w, originalIndex: i}));
        currentTestList = list.sort(() => Math.random() - 0.5);
        if (currentTestList.length === 0) return alert("시험할 단어가 없습니다!");
        testType = type; currentIndex = 0;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function checkAnswer() {
        let userAnswer = document.getElementById('answerInput').value.trim().toLowerCase();
        let q = currentTestList[currentIndex];
        let target = testType === 'word' ? q.word : q.mean;
        let correctAnswers = target.split(',').map(a => cleanText(a).toLowerCase());

        if (correctAnswers.includes(userAnswer)) {
            alert("정답!");
            // 오답에서 제거
            incorrectIndices = incorrectIndices.filter(i => i !== q.originalIndex);
        } else {
            alert("틀렸습니다. 정답: " + target);
            if (!incorrectIndices.includes(q.originalIndex)) incorrectIndices.push(q.originalIndex);
        }
        
        saveData();
        currentIndex++;
        currentIndex < currentTestList.length ? showQuestion() : (alert("끝!"), closeTest());
    }

    function showQuestion() {
        document.getElementById('question-text').innerText = testType === 'word' ? currentTestList[currentIndex].mean : currentTestList[currentIndex].word;
        document.getElementById('answerInput').value = '';
    }

    function saveData() { localStorage.setItem('words', JSON.stringify(words)); localStorage.setItem('incorrect', JSON.stringify(incorrectIndices)); }
    function resetIncorrect() { incorrectIndices = []; saveData(); alert("오답 초기화 완료"); }
    function closeTest() { document.getElementById('test-area').style.display = 'none'; }
    function showHint() { alert("첫 글자: " + (testType === 'word' ? currentTestList[currentIndex].word[0] : currentTestList[currentIndex].mean[0])); }
</script>
</body>
</html>
