<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Voca Trainer Pro (90 Words)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; background: #f5f7fa; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4a90e2; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-test { background: #4a90e2; color: white; }
        .btn-wrong { background: #e67e22; color: white; }
        .btn-reset { background: #95a5a6; color: white; }
        .btn-mix { background: #9b59b6; color: white; }
        
        #test-area { display: none; margin-top: 20px; padding: 30px; border: 3px solid #4a90e2; border-radius: 12px; text-align: center; background: #fff; }
        #question-info { color: #7f8c8d; font-size: 0.9em; margin-bottom: 10px; }
        #question-text { font-size: 2.5em; margin: 20px 0; color: #2c3e50; font-weight: bold; }
        input[type="text"] { width: 80%; padding: 12px; font-size: 1.2em; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; outline-color: #4a90e2; text-align: center; }
        
        .word-item { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .is-incorrect { background-color: #fff5f5; color: #e74c3c; }
        .badge { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; }

        .config-area { text-align: center; margin-bottom: 20px; padding: 15px; background: #edf2f7; border-radius: 10px; }
        .config-area input { width: 60px; padding: 5px; border-radius: 5px; border: 1px solid #cbd5e0; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Voca Trainer (90 Words)</h1>

    <div class="config-area">
        <span>문제 개수 설정: </span>
        <input type="number" id="testCount" value="30" min="1" max="90"> 개
    </div>
    
    <div class="btn-group">
        <button class="btn-test" onclick="startTest('toEng', false)">뜻 → 영어</button>
        <button class="btn-test" onclick="startTest('toKor', false)">영어 → 뜻</button>
        <button class="btn-mix" onclick="startTest('mix', false)">랜덤 혼합 시험</button>
        <button class="btn-wrong" onclick="startTest('toEng', true)">오답 시험 (뜻→영)</button>
        <button class="btn-wrong" onclick="startTest('toKor', true)">오답 시험 (영→뜻)</button>
        <button class="btn-reset" onclick="resetIncorrect()">오답 초기화</button>
    </div>

    <div id="test-area">
        <div id="question-info"></div>
        <div id="question-text"></div>
        <input type="text" id="answerInput" placeholder="정답을 입력하고 Enter" onkeypress="if(event.keyCode==13) checkAnswer()">
        <br>
        <button class="btn-test" onclick="checkAnswer()">제출</button>
    </div>

    <div class="word-list">
        <h3>단어 목록 (<span id="word-count">0</span>)</h3>
        <div id="list-container"></div>
    </div>
</div>

<script>
    // 이미지 3장의 90개 단어로 데이터 교체
    const words90 = [
        {word: "until 주어 동사", mean: "주어 동사할 때까지"}, {word: "fill", mean: "채우다"}, {word: "originally", mean: "원래"}, {word: "loss", mean: "분실, 상실"}, {word: "creativity", mean: "창의성"},
        {word: "purpose", mean: "목적"}, {word: "rule", mean: "규칙"}, {word: "judge", mean: "판단하다"}, {word: "meant to be ~", mean: "~하기로 되어 있는"}, {word: "cleanse", mean: "정화하다"},
        {word: "correctly", mean: "정확하게"}, {word: "keep", mean: "유지하다"}, {word: "completely", mean: "완전히"}, {word: "honestly", mean: "솔직히"}, {word: "be advised to ~", mean: "~하도록 조언 받다"},
        {word: "tend to ~", mean: "~하는 경향이 있다"}, {word: "stressful", mean: "스트레스가 많은"}, {word: "complaint", mean: "불평"}, {word: "improve", mean: "개선하다"}, {word: "recipe", mean: "조리법"},
        {word: "keep ~ing", mean: "계속 ~ing 하다"}, {word: "reach", mean: "도달하다"}, {word: "a sort of ~", mean: "일종의 ~"}, {word: "nowadays", mean: "요즘에는"}, {word: "productive", mean: "생산적인"},
        {word: "junior", mean: "3학년"}, {word: "random", mean: "무작위의"}, {word: "slight", mean: "약간의"}, {word: "assignment", mean: "과제"}, {word: "normally", mean: "보통은"},
        {word: "by ~ing", mean: "~ing 함으로써"}, {word: "task", mean: "과업, 일"}, {word: "towards ~", mean: "~을 향해"}, {word: "come up with ~", mean: "~을 떠올리다"}, {word: "a sense of ~", mean: "~의 감각"},
        {word: "most importantly", mean: "가장 중요한 것은"}, {word: "much (+ 비교급)", mean: "훨씬"}, {word: "totally", mean: "전적으로"}, {word: "relate to ~", mean: "~에 공감하다"}, {word: "during 명사", mean: "명사 동안"},
        {word: "at that time", mean: "그 당시에는"}, {word: "feel lost", mean: "어찌할 바를 모르다"}, {word: "unsure", mean: "불확실한"}, {word: "expect", mean: "기대하다"}, {word: "stick to ~", mean: "~를 계속하다"},
        {word: "release", mean: "방출하다"}, {word: "release ", mean: "개봉"}, {word: "onto ~", mean: "~ 위에"}, {word: "tension", mean: "긴장감"}, {word: "gain", mean: "얻다"},
        {word: "performance", mean: "수행"}, {word: "for instance", mean: "예를 들어"}, {word: "challenging", mean: "도전적인"}, {word: "sympathize with ~", mean: "~에 공감하다"}, {word: "in terms of ~", mean: "~에 관하여"},
        {word: "needs", mean: "요구사항"}, {word: "value", mean: "가치"}, {word: "come to know", mean: "알게 되다"}, {word: "childhood", mean: "어린 시절"}, {word: "gradually", mean: "점진적으로"},
        {word: "vague", mean: "애매한"}, {word: "successful", mean: "성공적인"}, {word: "publish", mean: "발행하다"}, {word: "still", mean: "여전히"}, {word: "drive", mean: "추진력"},
        {word: "achieve", mean: "달성하다"}, {word: "aim", mean: "목표"}, {word: "try ~ing", mean: "시험 삼아 ~해보다"}, {word: "perfectionist", mean: "완벽주의자"}, {word: "though", mean: "그러나"},
        {word: "miss", mean: "놓치다"}, {word: "a few ~", mean: "몇몇 ~"}, {word: "ultimate", mean: "궁극적인"}, {word: "indifferent", mean: "무관심한"}, {word: "encouraging", mean: "고무적인"},
        {word: "given", mean: "주어진"}, {word: "mistake", mean: "실수"}, {word: "engage in ~", mean: "~에 관여하다"}, {word: "more of", mean: "오히려"}, {word: "rather than ~", mean: "~보다는"},
        {word: "further", mean: "추가적인"}, {word: "in the beginning", mean: "처음에는"}, {word: "through ~", mean: "~을 통해"}, {word: "repetition", mean: "반복"}, {word: "repeat", mean: "반복하다"},
        {word: "specific", mean: "구체적인"}, {word: "meditate", mean: "명상하다"}, {word: "regularly", mean: "규칙적으로"}, {word: "even (+ 비교급)", mean: "훨씬"}, {word: "combine A with B", mean: "A와 B를 결합하다"}
    ];

    let words = words90;
    let wrongToEng = JSON.parse(localStorage.getItem('wrong_toEng_90')) || [];
    let wrongToKor = JSON.parse(localStorage.getItem('wrong_toKor_90')) || [];
    
    let testQueue = [], currentIndex = 0, currentType = '';
    let correctCount = 0;

    function renderList() {
        const container = document.getElementById('list-container');
        document.getElementById('word-count').innerText = words.length;
        container.innerHTML = words.map((w, i) => {
            const isWrong = wrongToEng.includes(i) || wrongToKor.includes(i);
            return `<div class="word-item ${isWrong ? 'is-incorrect' : ''}">
                <span><strong>${i+1}. ${w.word}</strong> : ${w.mean}</span>
                ${isWrong ? '<span class="badge">틀림</span>' : ''}
            </div>`;
        }).join('');
    }

    function startTest(type, onlyWrong) {
        let indices = onlyWrong 
            ? (type === 'toEng' ? wrongToEng : (type === 'toKor' ? wrongToKor : [...new Set([...wrongToEng, ...wrongToKor])]))
            : words.map((_, i) => i);
            
        if (indices.length === 0) return alert("시험볼 단어가 없습니다!");
        
        const limit = parseInt(document.getElementById('testCount').value) || indices.length;
        let selected = indices.sort(() => Math.random() - 0.5).slice(0, limit);
        
        testQueue = selected.map(id => {
            let finalType = type;
            if (type === 'mix') {
                finalType = Math.random() > 0.5 ? 'toEng' : 'toKor';
            }
            return {...words[id], originalId: id, questionType: finalType};
        });

        currentIndex = 0;
        correctCount = 0;
        currentType = type;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = testQueue[currentIndex];
        document.getElementById('question-info').innerText = `문제 ${currentIndex + 1} / ${testQueue.length}`;
        document.getElementById('question-text').innerText = (q.questionType === 'toEng') ? q.mean : q.word;
        document.getElementById('answerInput').value = '';
        document.getElementById('answerInput').focus();
    }

    function checkAnswer() {
        const q = testQueue[currentIndex];
        const input = document.getElementById('answerInput').value.trim().toLowerCase().replace(/\s/g, '');
        let isCorrect = false;

        if (q.questionType === 'toEng') {
            const target = q.word.toLowerCase().replace(/\s/g, '');
            isCorrect = (input === target);
            if (isCorrect) {
                wrongToEng = wrongToEng.filter(id => id !== q.originalId);
            } else {
                if (!wrongToEng.includes(q.originalId)) wrongToEng.push(q.originalId);
            }
        } else {
            const target = q.mean.toLowerCase().replace(/\s/g, '');
            isCorrect = target.includes(input) && input.length > 0;
            if (isCorrect) {
                wrongToKor = wrongToKor.filter(id => id !== q.originalId);
            } else {
                if (!wrongToKor.includes(q.originalId)) wrongToKor.push(q.originalId);
            }
        }

        if (isCorrect) {
            alert("정답입니다! ✨");
            correctCount++;
        } else {
            alert(`오답입니다! ❌\n정답: ${q.questionType === 'toEng' ? q.word : q.mean}`);
        }

        saveAndNext();
    }

    function saveAndNext() {
        localStorage.setItem('wrong_toEng_90', JSON.stringify(wrongToEng));
        localStorage.setItem('wrong_toKor_90', JSON.stringify(wrongToKor));
        
        currentIndex++;
        if (currentIndex < testQueue.length) {
            showQuestion();
        } else {
            const score = Math.round((correctCount / testQueue.length) * 100);
            alert(`시험 완료!\n🎯 점수: ${score}점 (${correctCount} / ${testQueue.length})`);
            document.getElementById('test-area').style.display = 'none';
            renderList();
        }
    }

    function resetIncorrect() {
        if(confirm("모든 오답 기록을 초기화할까요?")) {
            wrongToEng = [];
            wrongToKor = [];
            localStorage.removeItem('wrong_toEng_90');
            localStorage.removeItem('wrong_toKor_90');
            renderList();
        }
    }

    renderList();
</script>
</body>
</html>
