<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 스마트 단어장</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #f5f7fa; --accent: #e74c3c; }
        body { font-family: 'Pretendard', sans-serif; background: var(--secondary); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: var(--primary); }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; }
        .btn-test { background: #2ecc71; color: white; margin: 5px; }
        .btn-danger { background: var(--accent); color: white; }

        .word-list { margin-top: 20px; border-top: 2px solid var(--secondary); padding-top: 20px; }
        .word-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .word-info { flex: 1; }

        #test-area { display: none; background: #fff; border: 2px solid var(--primary); padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; }
        .hint { color: #888; font-size: 0.9em; margin-top: 10px; display: block; }
        
        .guide { font-size: 0.85em; color: #666; margin-bottom: 10px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 My Voca Trainer</h1>

    <div class="guide">* 여러 뜻은 쉼표(,)로 구분하세요. (예: 사과,미안하다)</div>
    <div class="input-group">
        <input type="text" id="wordInput" placeholder="영어 단어">
        <input type="text" id="meanInput" placeholder="뜻 (여러 개일 경우 쉼표로 구분)">
        <button class="btn-add" onclick="addWord()">추가</button>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <input type="number" id="startNum" placeholder="시작" style="width: 60px;"> ~ 
        <input type="number" id="endNum" placeholder="끝" style="width: 60px;">
        <br><br>
        <button class="btn-test" onclick="startTest('word', false)">단어 시험(주관식)</button>
        <button class="btn-test" onclick="startTest('mean', false)">뜻 시험(주관식)</button>
        <button class="btn-danger" onclick="startTest('word', true)">오답 시험</button>
        <button class="btn-danger" onclick="resetIncorrect()">오답 초기화</button>
    </div>

    <div id="test-area">
        <h2 id="test-title">시험 중</h2>
        <div id="question-container">
            <h3 id="question-text" style="font-size: 1.5em; margin-bottom: 5px;"></h3>
            <p style="color:#999; margin-bottom: 20px;">(하나만 써도 정답!)</p>
            <input type="text" id="answerInput" placeholder="정답 입력" onkeypress="if(window.event.keyCode==13){checkAnswer()}">
            <button class="btn-add" onclick="checkAnswer()">제출</button>
            <button id="hint-btn" style="background: #f1c40f;" onclick="showHint()">힌트</button>
            <span id="hint-text" class="hint"></span>
        </div>
        <button class="btn-danger" style="margin-top: 20px;" onclick="closeTest()">시험 중단</button>
    </div>

    <div class="word-list">
        <h3>내 단어장 (총 <span id="word-count">0</span>개)</h3>
        <div id="list-container"></div>
    </div>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('words')) || [];
    let incorrectIndices = JSON.parse(localStorage.getItem('incorrect')) || [];
    let currentTestList = [];
    let currentIndex = 0;
    let testType = '';

    function addWord() {
        const word = document.getElementById('wordInput').value.trim();
        const mean = document.getElementById('meanInput').value.trim();
        if(!word || !mean) return alert("단어와 뜻을 모두 입력하세요!");

        words.push({ word, mean });
        saveData();
        renderList();
        document.getElementById('wordInput').value = '';
        document.getElementById('meanInput').value = '';
    }

    function deleteWord(index) {
        words.splice(index, 1);
        saveData();
        renderList();
    }

    function saveData() {
        localStorage.setItem('words', JSON.stringify(words));
        localStorage.setItem('incorrect', JSON.stringify(incorrectIndices));
    }

    function renderList() {
        const container = document.getElementById('list-container');
        const count = document.getElementById('word-count');
        container.innerHTML = '';
        count.innerText = words.length;

        words.forEach((item, index) => {
            const isIncorrect = incorrectIndices.includes(index);
            container.innerHTML += `
                <div class="word-item">
                    <div class="word-info">
                        <strong>${index + 1}. ${item.word}</strong> : ${item.mean}
                        ${isIncorrect ? '<span style="color:red; font-size:0.8em;"> [오답]</span>' : ''}
                    </div>
                    <button class="btn-danger" onclick="deleteWord(${index})" style="padding: 5px 10px;">삭제</button>
                </div>
            `;
        });
    }

    function startTest(type, onlyIncorrect) {
        const start = parseInt(document.getElementById('startNum').value) || 1;
        const end = parseInt(document.getElementById('endNum').value) || words.length;

        if (onlyIncorrect) {
            currentTestList = incorrectIndices.map(i => ({...words[i], originalIndex: i}));
        } else {
            currentTestList = words.slice(start - 1, end).map((w, i) => ({...w, originalIndex: start - 1 + i}));
        }

        if (currentTestList.length === 0) return alert("시험 볼 단어가 없습니다!");

        testType = type;
        currentIndex = 0;
        document.getElementById('test-area').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = currentTestList[currentIndex];
        const text = testType === 'word' ? q.mean : q.word;
        document.getElementById('question-text').innerText = text;
        document.getElementById('answerInput').value = '';
        document.getElementById('hint-text').innerText = '';
        document.getElementById('answerInput').focus();
    }

    function checkAnswer() {
        const userAnswer = document.getElementById('answerInput').value.trim().toLowerCase();
        const q = currentTestList[currentIndex];
        const originalIdx = q.originalIndex;
        
        // 정답들을 쉼표로 나누어 배열로 만듭니다.
        const correctAnswers = (testType === 'word' ? q.word : q.mean)
                                .split(',')
                                .map(ans => ans.trim().toLowerCase());

        // 입력한 값이 정답 배열 중에 하나라도 일치하는지 확인합니다.
        if (correctAnswers.includes(userAnswer)) {
            alert("정답입니다!");
        } else {
            alert(`틀렸습니다! 정답: ${correctAnswers.join(', ')}`);
            if (!incorrectIndices.includes(originalIdx)) {
                incorrectIndices.push(originalIdx);
            }
        }

        currentIndex++;
        if (currentIndex < currentTestList.length) {
            showQuestion();
        } else {
            alert("시험이 끝났습니다!");
            closeTest();
        }
        saveData();
        renderList();
    }

    function showHint() {
        const q = currentTestList[currentIndex];
        const correctAnswer = testType === 'word' ? q.word : q.mean;
        // 여러 정답 중 첫 번째 정답의 첫 글자만 힌트로 보여줍니다.
        const firstHint = correctAnswer.split(',')[0].trim();
        document.getElementById('hint-text').innerText = `힌트: 첫 글자는 '${firstHint[0]}' 입니다.`;
    }

    function resetIncorrect() {
        if(confirm("오답 기록을 초기화하시겠습니까?")) {
            incorrectIndices = [];
            saveData();
            renderList();
        }
    }

    function closeTest() {
        document.getElementById('test-area').style.display = 'none';
    }

    renderList();
</script>

</body>
</html>
